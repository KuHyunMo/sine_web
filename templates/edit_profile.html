<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로필 수정</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="profile-body"> 
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="color: #135B79; margin: 0; font-size: 24px;">프로필 수정 ✍️</h2>
            <a href="/profile" class="btn-dark" style="font-size: 13px; padding: 8px 15px;">← 프로필로 돌아가기</a>
        </div>

        <!-- 1. action과 method를 제거하고 id를 추가하여 자바스크립트가 제어하게 합니다. -->
        <form id="profileForm" onsubmit="event.preventDefault();"
              style="background-color: #f9f9f9; padding: 30px; border-radius: 12px; border: 2px solid #0B3D53;">
            
            <label style="display:block; font-weight:bold; margin-bottom: 5px; color: #135B79;">프로필 사진 변경</label>
            <!-- 2. 자바스크립트에서 찾을 수 있도록 id="profile_image"를 추가합니다. -->
            <input type="file" id="profile_image" name="profile_image" accept="image/*" style="margin-bottom: 20px; width: 100%;">

            <label style="display:block; font-weight:bold; margin-bottom: 5px; color: #135B79;">이메일</label>
            <!-- 3. id="email"을 추가합니다. -->
            <input type="email" id="email" name="email" placeholder="이메일" value="{{ user.email if user.email else '' }}" 
                   style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc;">
            
            <label style="display:block; font-weight:bold; margin-bottom: 5px; color: #135B79;">전화번호</label>
            <!-- 4. id="phone_number"를 추가합니다. -->
            <input type="text" id="phone_number" name="phone_number" placeholder="010-0000-0000" value="{{ user.phone_number if user.phone_number else '' }}" 
                   style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc;">
            
            <label style="display:block; font-weight:bold; margin-bottom: 5px; color: #135B79;">자기 소개</label>
            <!-- 5. id="bio"를 추가합니다. -->
            <textarea id="bio" name="bio" placeholder="자기 소개를 적어주세요" 
                      style="width: 100%; height: 100px; padding: 10px; margin-bottom: 25px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit;">{{ user.bio if user.bio else '' }}</textarea>
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button type="button" onclick="deleteAccount()" style="background-color: #e74c3c; padding: 10px 20px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold;">회원 탈퇴</button>
                
                <div>
                    <a href="/profile" style="margin-right: 15px; color: #555; text-decoration: none; font-weight: bold;">취소</a>
                    <!-- 6. type="submit"을 "button"으로 바꾸고 onclick 이벤트를 연결합니다. -->
                    <button type="button" class="btn-dark" onclick="updateProfile()" style="padding: 10px 20px;">저장하기</button>
                </div>
            </div>
        </form>
    </div>

    <script src="/static/edit_profile.js"></script>
</body>
</html>
