<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소개 편집</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* 편집 페이지 전용 정밀 스타일 */
        .edit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* 소개 추가 박스 */
        .add-box {
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 16px;
            border: 2px solid #135B79;
            margin-bottom: 40px;
        }

        /* ⭐️ 버튼을 우측으로 보내는 컨테이너 */
        .button-row {
            display: flex;
            justify-content: flex-end; 
            margin-top: 15px;
        }

        /* 삭제 버튼: 슬림하고 텍스트와 수평이 딱 맞도록 설정 */
        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            width: 45px;
            height: 24px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            flex-shrink: 0;
            display: inline-flex; /* 텍스트 정렬을 위해 flex 사용 */
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body class="profile-body">
    <div class="container">
        
        <div class="edit-header">
            <h2 style="color: #135B79; margin: 0; font-size: 24px;">소개글 편집 🛠️</h2>
            <a href="/profile" class="btn-dark" style="font-size: 13px; padding: 8px 15px;">← 프로필로 돌아가기</a>
        </div>
        
        <div class="add-box">
            <h3 style="margin-bottom: 12px; color: #135B79; font-size: 18px;">+ 새 소개글 추가</h3>
            <textarea id="section_content" placeholder="내용을 입력하세요..." 
                      style="width: 100%; height: 100px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; font-size: 16px; resize: none;"></textarea>
            
            <div class="button-row">
                <button onclick="addSection()" class="btn-dark" style="width: 120px; padding: 10px;">추가하기</button>
            </div>
        </div>

        <h3 style="margin-bottom: 20px; color: #135B79; font-size: 18px;">내 소개창 목록</h3>
        
        <div class="sections-container">
            {% for sec in sections %}
            <div class="section-box" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; gap: 15px; min-height: 50px;">
                <div style="flex: 1; min-width: 0; display: flex; align-items: center;">
                    <p style="margin: 0; font-size: 17px; line-height: 1.4; word-break: break-all; color: white;">{{ sec.content }}</p>
                </div>
                
                <button onclick="deleteSection('{{ sec.id }}')" class="btn-delete">삭제</button>
            </div>
            {% else %}
            <p style="text-align: center; color: #888; margin-top: 50px;">등록된 소개글이 없습니다.</p>
            {% endfor %}
        </div>
    </div>

    <script src="/static/edit_sections.js"></script>
</body>
</html>
